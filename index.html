<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>复古电视模拟器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .tv-room {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            padding: 20px;
        }

        .tv-cabinet {
            background: linear-gradient(145deg, #8B4513, #654321, #3d2b1f);
            border-radius: 20px;
            padding: 40px 35px 60px;
            box-shadow:
                0 20px 60px rgba(0,0,0,0.8),
                inset 0 2px 4px rgba(255,255,255,0.1),
                inset 0 -2px 4px rgba(0,0,0,0.3);
            position: relative;
        }

        .tv-cabinet::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            height: 3px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            border-radius: 50%;
        }

        .tv-brand {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #d4a853;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .screen-bezel {
            background: #111;
            border-radius: 12px;
            padding: 15px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.9);
        }

        .screen-container {
            position: relative;
            width: 640px;
            height: 480px;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }

        #video-player {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .scanlines {
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 1px,
                rgba(0, 0, 0, 0.15) 1px,
                rgba(0, 0, 0, 0.15) 2px
            );
        }

        .vignette {
            background: radial-gradient(
                ellipse at center,
                transparent 60%,
                rgba(0, 0, 0, 0.6) 100%
            );
        }

        .screen-curve {
            box-shadow: inset 0 0 80px rgba(0,0,0,0.4);
            border-radius: 8px;
        }

        .static-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.1s;
            background: #111;
        }

        .static-overlay.active {
            opacity: 1;
        }

        .static-overlay canvas {
            width: 100%;
            height: 100%;
        }

        .channel-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 15;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 18px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        .channel-badge.visible {
            opacity: 1;
        }

        .program-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 15;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            color: #fff;
            padding: 30px 15px 10px;
            font-size: 13px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .program-info.visible {
            opacity: 1;
        }

        .program-info .program-title {
            font-size: 15px;
            font-weight: bold;
            color: #ffd700;
        }

        .program-info .program-time {
            color: #aaa;
            margin-top: 3px;
        }

        .ad-placeholder-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 15;
            background: rgba(255, 165, 0, 0.8);
            color: #000;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .ad-placeholder-badge.visible {
            opacity: 1;
        }

        .channel-panel {
            background: linear-gradient(145deg, #2d2d44, #1e1e32);
            border-radius: 12px;
            padding: 20px;
            min-width: 280px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .panel-title {
            color: #ffd700;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
        }

        .channel-list {
            list-style: none;
        }

        .channel-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            margin-bottom: 6px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            color: #ccc;
        }

        .channel-item:hover {
            background: rgba(255, 215, 0, 0.1);
            color: #fff;
        }

        .channel-item.active {
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .channel-number {
            background: #333;
            color: #ffd700;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .channel-name {
            font-size: 14px;
        }

        .channel-now-playing {
            font-size: 11px;
            color: #888;
            margin-top: 2px;
        }

        .time-display {
            text-align: center;
            color: #0f0;
            font-size: 20px;
            margin-top: 15px;
            padding: 10px;
            background: #111;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        .time-display .date {
            font-size: 12px;
            color: #0a0;
            margin-top: 4px;
        }

        .time-display .sim-label {
            font-size: 10px;
            color: #f80;
            margin-top: 4px;
            display: none;
        }

        .time-display .sim-label.active {
            display: block;
        }

        /* 时间模拟面板 */
        .sim-panel {
            margin-top: 15px;
            border-top: 1px solid #444;
            padding-top: 12px;
        }

        .sim-panel-title {
            color: #888;
            font-size: 11px;
            text-align: center;
            margin-bottom: 8px;
        }

        .sim-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
        }

        .sim-row label {
            color: #999;
            font-size: 11px;
            width: 36px;
            flex-shrink: 0;
        }

        .sim-row select, .sim-row input {
            background: #222;
            color: #ccc;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 4px 6px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            flex: 1;
        }

        .sim-buttons {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .sim-btn {
            flex: 1;
            background: #333;
            color: #ccc;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 6px 8px;
            font-size: 11px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.2s;
        }

        .sim-btn:hover {
            background: #444;
            color: #fff;
        }

        .sim-btn.active {
            background: #553300;
            color: #ffd700;
            border-color: #ffd700;
        }

        .sim-btn.reset {
            background: #1a3320;
            color: #0f0;
            border-color: #0f0;
        }

        .instructions {
            color: #666;
            font-size: 11px;
            text-align: center;
            margin-top: 12px;
            line-height: 1.6;
        }

        @keyframes tvTurnOn {
            0% {
                transform: scaleY(0.01) scaleX(0.5);
                filter: brightness(5);
            }
            50% {
                transform: scaleY(0.01) scaleX(1);
                filter: brightness(3);
            }
            100% {
                transform: scaleY(1) scaleX(1);
                filter: brightness(1);
            }
        }

        .screen-container.turning-on {
            animation: tvTurnOn 0.5s ease-out;
        }

        @keyframes channelFlicker {
            0%, 100% { opacity: 1; }
            25% { opacity: 0.3; }
            50% { opacity: 0.8; }
            75% { opacity: 0.2; }
        }

        .screen-container.flickering {
            animation: channelFlicker 0.3s ease-in-out;
        }

        @media (max-width: 1024px) {
            .tv-room {
                flex-direction: column;
                align-items: center;
            }
            .screen-container {
                width: 480px;
                height: 360px;
            }
        }
    </style>
</head>

    // ============================================================
    // 播放器状态
    // ============================================================
    let currentChannelIndex = 0;
    let currentProgramKey = null; // "channelIdx:progIndex" 用于检测节目变更
    let isSwitching = false;
    let badgeTimeout = null;
    let infoTimeout = null;
    let staticAnimFrame = null;

    const videoEl = document.getElementById('video-player');
    const staticOverlay = document.getElementById('static-overlay');
    const staticCanvas = document.getElementById('static-canvas');
    const staticCtx = staticCanvas.getContext('2d');
    const channelBadge = document.getElementById('channel-badge');
    const adBadge = document.getElementById('ad-badge');
    const programInfo = document.getElementById('program-info');
    const programTitle = document.getElementById('program-title');
    const programTime = document.getElementById('program-time');
    const channelListEl = document.getElementById('channel-list');
    const clockEl = document.getElementById('clock');
    const dateEl = document.getElementById('date-display');
    const simLabel = document.getElementById('sim-label');

    // ============================================================
    // 工具函数
    // ============================================================
    function timeToMinutes(timeStr) {
        const [h, m] = timeStr.split(':').map(Number);
        return h * 60 + m;
    }

    function getCurrentProgram(channel) {
        const now = getNow();
        const day = now.getDay();
        const currentMinutes = now.getHours() * 60 + now.getMinutes();
        const daySchedule = channel.schedule[day];

        for (let i = 0; i < daySchedule.length; i++) {
            const prog = daySchedule[i];
            const startMin = timeToMinutes(prog.start);
            let endMin = timeToMinutes(prog.end);
            if (endMin === 0) endMin = 1440;

            if (startMin <= endMin) {
                if (currentMinutes >= startMin && currentMinutes < endMin) {
                    return { ...prog, index: i, daySchedule };
                }
            } else {
                if (currentMinutes >= startMin || currentMinutes < endMin) {
                    return { ...prog, index: i, daySchedule };
                }
            }
        }
        return { ...daySchedule[0], index: 0, daySchedule };
    }

    function getNextProgramInSchedule(channel, currentIndex) {
        const now = getNow();
        const day = now.getDay();
        const daySchedule = channel.schedule[day];
        const nextIndex = (currentIndex + 1) % daySchedule.length;
        return { ...daySchedule[nextIndex], index: nextIndex, daySchedule };
    }

    // ============================================================
    // 雪花效果
    // ============================================================
    function resizeStaticCanvas() {
        staticCanvas.width = staticCanvas.offsetWidth || 640;
        staticCanvas.height = staticCanvas.offsetHeight || 480;
    }

    function drawStatic() {
        const w = staticCanvas.width;
        const h = staticCanvas.height;
        const imageData = staticCtx.createImageData(w, h);
        const data = imageData.data;
        for (let i = 0; i < data.length; i += 4) {
            const val = Math.random() * 255;
            data[i] = val;
            data[i + 1] = val;
            data[i + 2] = val;
            data[i + 3] = 255;
        }
        staticCtx.putImageData(imageData, 0, 0);
        staticAnimFrame = requestAnimationFrame(drawStatic);
    }

    function showStatic() {
        resizeStaticCanvas();
        staticOverlay.classList.add('active');
        drawStatic();
    }

    function hideStatic() {
        staticOverlay.classList.remove('active');
        if (staticAnimFrame) {
            cancelAnimationFrame(staticAnimFrame);
            staticAnimFrame = null;
        }
    }

    // ============================================================
    // 真实视频播放
    // ============================================================
    function playVideoForProgram(program) {
        const url = VIDEO_SOURCES[program.id];
        if (!url) {
            console.warn('No video URL for program:', program.id);
            return;
        }

        // 清除之前的 srcObject（如果有canvas流残留）
        if (videoEl.srcObject) {
            videoEl.srcObject = null;
        }

        videoEl.src = url;
        videoEl.load();
        videoEl.play().catch(e => {
            console.log('Autoplay blocked, user interaction needed:', e.message);
        });

        // 更新广告标识
        if (program.isAd) {
            adBadge.classList.add('visible');
        } else {
            adBadge.classList.remove('visible');
        }
    }

    // ============================================================
    // 视频结束事件：自动进入下一节目
    // ============================================================
    videoEl.addEventListener('ended', () => {
        const channel = CHANNELS[currentChannelIndex];
        const currentProg = getCurrentProgram(channel);

        // 检查当前时间段是否还在同一节目（视频比时间段短，需要循环）
        const progKey = `${currentChannelIndex}:${currentProg.index}`;
        if (progKey === currentProgramKey) {
            // 还在同一时间段内，视频比节目时间短 → 循环播放
            videoEl.currentTime = 0;
            videoEl.play().catch(() => {});
        } else {
            // 时间已经进入下一个节目段 → 切换到下一节目
            advanceToProgram(currentProg);
        }
    });

    function advanceToProgram(program) {
        currentProgramKey = `${currentChannelIndex}:${program.index}`;
        playVideoForProgram(program);
        showProgramInfo(program);
    }

    // ============================================================
    // 频道切换
    // ============================================================
    function switchChannel(newIndex, immediate = false) {
        if (isSwitching) return;
        if (newIndex < 0 || newIndex >= CHANNELS.length) return;
        if (newIndex === currentChannelIndex && !immediate) return;

        isSwitching = true;
        const channel = CHANNELS[newIndex];
        const program = getCurrentProgram(channel);

        if (immediate) {
            currentChannelIndex = newIndex;
            currentProgramKey = `${newIndex}:${program.index}`;
            playVideoForProgram(program);
            updateUI();
            isSwitching = false;
            return;
        }

        // 暂停当前视频
        videoEl.pause();

        // 雪花 + 闪烁过渡
        showStatic();
        const screen = document.getElementById('screen');
        screen.classList.add('flickering');

        const delay = 300 + Math.random() * 500;

        setTimeout(() => {
            currentChannelIndex = newIndex;
            currentProgramKey = `${newIndex}:${program.index}`;
            playVideoForProgram(program);
            hideStatic();
            screen.classList.remove('flickering');
            updateUI();
            showChannelBadge(channel);
            showProgramInfo(program);
            isSwitching = false;
        }, delay);
    }

    // ============================================================
    // UI
    // ============================================================
    function showChannelBadge(channel) {
        channelBadge.textContent = `CH ${String(channel.id).padStart(2, '0')}`;
        channelBadge.classList.add('visible');
        clearTimeout(badgeTimeout);
        badgeTimeout = setTimeout(() => {
            channelBadge.classList.remove('visible');
        }, 3000);
    }

    function showProgramInfo(program) {
        programTitle.textContent = program.title;
        programTime.textContent = `${program.start} ~ ${program.end}`;
        programInfo.classList.add('visible');
        clearTimeout(infoTimeout);
        infoTimeout = setTimeout(() => {
            programInfo.classList.remove('visible');
        }, 4000);
    }

    function updateUI() {
        const items = channelListEl.querySelectorAll('.channel-item');
        items.forEach((item, idx) => {
            item.classList.toggle('active', idx === currentChannelIndex);
            const nowPlaying = item.querySelector('.channel-now-playing');
            const prog = getCurrentProgram(CHANNELS[idx]);
            nowPlaying.textContent = prog.title;
        });
    }

    function updateClock() {
        const now = getNow();
        const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
        clockEl.textContent = timeStr;

        const days = ['日', '一', '二', '三', '四', '五', '六'];
        const dateStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 星期${days[now.getDay()]}`;
        dateEl.textContent = dateStr;

        simLabel.classList.toggle('active', simulatedTime !== null);
    }

    // ============================================================
    // 节目轮询：检测时间表驱动的切换
    // ============================================================
    function checkScheduledProgramChange() {
        const channel = CHANNELS[currentChannelIndex];
        const program = getCurrentProgram(channel);
        const progKey = `${currentChannelIndex}:${program.index}`;

        if (progKey !== currentProgramKey) {
            // 时间表指示应切换到新节目
            currentProgramKey = progKey;
            playVideoForProgram(program);
            showProgramInfo(program);
        }

        updateUI();
    }

    // ============================================================
    // 时间模拟控制
    // ============================================================
    function initSimPanel() {
        const simDayEl = document.getElementById('sim-day');
        const simTimeEl = document.getElementById('sim-time');
        const simApplyBtn = document.getElementById('sim-apply');
        const simResetBtn = document.getElementById('sim-reset');

        // 默认值设为当前时间
        const now = new Date();
        simDayEl.value = String(now.getDay());
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        simTimeEl.value = `${hh}:${mm}`;

        simApplyBtn.addEventListener('click', () => {
            const day = parseInt(simDayEl.value);
            const [hours, minutes] = simTimeEl.value.split(':').map(Number);
            setSimulatedTime(day, hours, minutes);

            // 立即刷新当前频道播放
            const channel = CHANNELS[currentChannelIndex];
            const program = getCurrentProgram(channel);
            currentProgramKey = `${currentChannelIndex}:${program.index}`;
            playVideoForProgram(program);
            showProgramInfo(program);
            updateClock();
            updateUI();

            simApplyBtn.classList.add('active');
            simResetBtn.classList.remove('active');
        });

        simResetBtn.addEventListener('click', () => {
            clearSimulatedTime();

            const channel = CHANNELS[currentChannelIndex];
            const program = getCurrentProgram(channel);
            currentProgramKey = `${currentChannelIndex}:${program.index}`;
            playVideoForProgram(program);
            showProgramInfo(program);
            updateClock();
            updateUI();

            simResetBtn.classList.add('active');
            simApplyBtn.classList.remove('active');
            setTimeout(() => simResetBtn.classList.remove('active'), 1000);
        });
    }

    // ============================================================
    // 初始化
    // ============================================================
    function initChannelList() {
        CHANNELS.forEach((channel, idx) => {
            const li = document.createElement('li');
            li.className = 'channel-item' + (idx === 0 ? ' active' : '');
            li.innerHTML = `
                <div class="channel-number">${channel.id}</div>
                <div>
                    <div class="channel-name">${channel.name}</div>
                    <div class="channel-now-playing">--</div>
                </div>
            `;
            li.addEventListener('click', () => switchChannel(idx));
            channelListEl.appendChild(li);
        });
    }

    function init() {
        initChannelList();
        initSimPanel();
        resizeStaticCanvas();

        // 开机动画
        const screen = document.getElementById('screen');
        screen.classList.add('turning-on');
        showStatic();

        setTimeout(() => {
            hideStatic();
            screen.classList.remove('turning-on');

            const channel = CHANNELS[currentChannelIndex];
            const program = getCurrentProgram(channel);
            currentProgramKey = `${currentChannelIndex}:${program.index}`;
            playVideoForProgram(program);
            showChannelBadge(channel);
            showProgramInfo(program);
            updateUI();
        }, 800);

        updateClock();
        setInterval(updateClock, 1000);
        setInterval(checkScheduledProgramChange, 1000);
    }

    // ============================================================
    // 键盘控制
    // ============================================================
    document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
        switch(e.key) {
            case 'ArrowUp':
                e.preventDefault();
                switchChannel(currentChannelIndex - 1);
                break;
            case 'ArrowDown':
                e.preventDefault();
                switchChannel(currentChannelIndex + 1);
                break;
            case '1': case '2': case '3': case '4':
                switchChannel(parseInt(e.key) - 1);
                break;
            case ' ':
                e.preventDefault();
                videoEl.muted = !videoEl.muted;
                break;
        }
    });

    // 点击屏幕允许autoplay（浏览器策略）
    document.getElementById('screen').addEventListener('click', () => {
        if (videoEl.paused) {
            videoEl.play().catch(() => {});
        }
    });

    window.addEventListener('load', init);
    window.addEventListener('resize', resizeStaticCanvas);
    </script>
