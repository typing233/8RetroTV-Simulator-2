<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>复古电视模拟器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .tv-room {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            padding: 20px;
        }

        /* === 电视机外壳 === */
        .tv-cabinet {
            background: linear-gradient(145deg, #8B4513, #654321, #3d2b1f);
            border-radius: 20px;
            padding: 40px 35px 60px;
            box-shadow:
                0 20px 60px rgba(0,0,0,0.8),
                inset 0 2px 4px rgba(255,255,255,0.1),
                inset 0 -2px 4px rgba(0,0,0,0.3);
            position: relative;
        }

        .tv-cabinet::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            height: 3px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            border-radius: 50%;
        }

        .tv-brand {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #d4a853;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* === 屏幕区域 === */
        .screen-bezel {
            background: #111;
            border-radius: 12px;
            padding: 15px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.9);
        }

        .screen-container {
            position: relative;
            width: 640px;
            height: 480px;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }

        #video-player {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* CRT 扫描线效果 */
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .scanlines {
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 1px,
                rgba(0, 0, 0, 0.15) 1px,
                rgba(0, 0, 0, 0.15) 2px
            );
        }

        .vignette {
            background: radial-gradient(
                ellipse at center,
                transparent 60%,
                rgba(0, 0, 0, 0.6) 100%
            );
        }

        .screen-curve {
            box-shadow: inset 0 0 80px rgba(0,0,0,0.4);
            border-radius: 8px;
        }

        /* === 雪花/静电效果 === */
        .static-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.1s;
            background: #111;
        }

        .static-overlay.active {
            opacity: 1;
        }

        .static-overlay canvas {
            width: 100%;
            height: 100%;
        }

        /* === 频道标识 === */
        .channel-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 15;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 18px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        .channel-badge.visible {
            opacity: 1;
        }

        /* === 节目信息条 === */
        .program-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 15;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            color: #fff;
            padding: 30px 15px 10px;
            font-size: 13px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .program-info.visible {
            opacity: 1;
        }

        .program-info .program-title {
            font-size: 15px;
            font-weight: bold;
            color: #ffd700;
        }

        .program-info .program-time {
            color: #aaa;
            margin-top: 3px;
        }

        /* === 广告占位标识 === */
        .ad-placeholder-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 15;
            background: rgba(255, 165, 0, 0.8);
            color: #000;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .ad-placeholder-badge.visible {
            opacity: 1;
        }

        /* === 控制旋钮区 === */
        .tv-controls {
            position: absolute;
            right: -60px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .knob {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #888, #333);
            box-shadow: 0 3px 6px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .knob:hover {
            transform: scale(1.1);
        }

        .knob:active {
            transform: scale(0.95);
        }

        /* === 频道列表面板 === */
        .channel-panel {
            background: linear-gradient(145deg, #2d2d44, #1e1e32);
            border-radius: 12px;
            padding: 20px;
            min-width: 260px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .panel-title {
            color: #ffd700;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
        }

        .channel-list {
            list-style: none;
        }

        .channel-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            margin-bottom: 6px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            color: #ccc;
        }

        .channel-item:hover {
            background: rgba(255, 215, 0, 0.1);
            color: #fff;
        }

        .channel-item.active {
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .channel-number {
            background: #333;
            color: #ffd700;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
        }

        .channel-name {
            font-size: 14px;
        }

        .channel-now-playing {
            font-size: 11px;
            color: #888;
            margin-top: 2px;
        }

        /* === 时间显示 === */
        .time-display {
            text-align: center;
            color: #0f0;
            font-size: 20px;
            margin-top: 15px;
            padding: 10px;
            background: #111;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        .time-display .date {
            font-size: 12px;
            color: #0a0;
            margin-top: 4px;
        }

        /* === 提示信息 === */
        .instructions {
            color: #666;
            font-size: 11px;
            text-align: center;
            margin-top: 12px;
            line-height: 1.6;
        }

        /* === CRT 开机/关机动画 === */
        @keyframes tvTurnOn {
            0% {
                transform: scaleY(0.01) scaleX(0.5);
                filter: brightness(5);
            }
            50% {
                transform: scaleY(0.01) scaleX(1);
                filter: brightness(3);
            }
            100% {
                transform: scaleY(1) scaleX(1);
                filter: brightness(1);
            }
        }

        .screen-container.turning-on {
            animation: tvTurnOn 0.5s ease-out;
        }

        /* === 频道切换闪烁 === */
        @keyframes channelFlicker {
            0%, 100% { opacity: 1; }
            25% { opacity: 0.3; }
            50% { opacity: 0.8; }
            75% { opacity: 0.2; }
        }

        .screen-container.flickering {
            animation: channelFlicker 0.3s ease-in-out;
        }

        /* === 响应式 === */
        @media (max-width: 1024px) {
            .tv-room {
                flex-direction: column;
                align-items: center;
            }
            .screen-container {
                width: 480px;
                height: 360px;
            }
        }
    </style>
</head>

            <div class="tv-brand">RETRO-VISION</div>

                    { id: 'ad_slot_1', title: '广告时段', start: '08:00', end: '08:05', isAd: true },
                    { id: 'cartoon_morning', title: '经典动画重温', start: '08:05', end: '10:00' },
                    { id: 'cartoon_afternoon', title: '冒险动画', start: '10:00', end: '12:00' },
                    { id: 'ad_slot_2', title: '广告时段', start: '12:00', end: '12:05', isAd: true },
                    { id: 'cartoon_morning', title: '午间动画', start: '12:05', end: '14:00' },
                    { id: 'cartoon_afternoon', title: '校园故事', start: '14:00', end: '16:00' },
                    { id: 'ad_slot_1', title: '广告时段', start: '16:00', end: '16:05', isAd: true },
                    { id: 'cartoon_evening', title: '放学时光', start: '16:05', end: '18:00' },
                    { id: 'ad_slot_3', title: '广告时段', start: '18:00', end: '18:05', isAd: true },
                    { id: 'cartoon_evening', title: '晚间动画剧场', start: '18:05', end: '20:00' },
                    { id: 'cartoon_afternoon', title: '睡前故事', start: '20:00', end: '21:00' },
                    { id: 'cartoon_morning', title: '深夜重播', start: '21:00', end: '00:00' },
                    { id: 'cartoon_evening', title: '通宵动画', start: '00:00', end: '06:00' },
                ],
                weekend: [
                    { id: 'cartoon_morning', title: '周末动画大放送', start: '07:00', end: '09:00' },
                    { id: 'ad_slot_1', title: '广告时段', start: '09:00', end: '09:05', isAd: true },
                    { id: 'cartoon_afternoon', title: '冒险特辑', start: '09:05', end: '11:00' },
                    { id: 'cartoon_evening', title: '奇幻世界', start: '11:00', end: '12:30' },
                    { id: 'ad_slot_2', title: '广告时段', start: '12:30', end: '12:35', isAd: true },
                    { id: 'cartoon_morning', title: '经典动画回顾', start: '12:35', end: '14:30' },
                    { id: 'cartoon_afternoon', title: '新番连播', start: '14:30', end: '17:00' },
                    { id: 'ad_slot_3', title: '广告时段', start: '17:00', end: '17:05', isAd: true },
                    { id: 'cartoon_evening', title: '动画电影', start: '17:05', end: '19:00' },
                    { id: 'cartoon_morning', title: '经典重温', start: '19:00', end: '21:00' },
                    { id: 'cartoon_afternoon', title: '周末晚场', start: '21:00', end: '23:00' },
                    { id: 'cartoon_evening', title: '午夜动画', start: '23:00', end: '07:00' },
                ]
            })
        }
    ];

    // 构建一周时间表（weekday应用于周一至周五，weekend应用于周六周日）
    function buildSchedule(config) {
        const schedule = {};
        for (let day = 0; day < 7; day++) {
            if (day === 0 || day === 6) {
                schedule[day] = config.weekend;
            } else {
                schedule[day] = config.weekday;
            }
        }
        return schedule;
    }

    // ============================================================
    // 播放器状态
    // ============================================================
    let currentChannelIndex = 0;
    let isSwitching = false;
    let badgeTimeout = null;
    let infoTimeout = null;
    let staticAnimFrame = null;

    const videoEl = document.getElementById('video-player');
    const staticOverlay = document.getElementById('static-overlay');
    const staticCanvas = document.getElementById('static-canvas');
    const staticCtx = staticCanvas.getContext('2d');
    const channelBadge = document.getElementById('channel-badge');
    const adBadge = document.getElementById('ad-badge');
    const programInfo = document.getElementById('program-info');
    const programTitle = document.getElementById('program-title');
    const programTime = document.getElementById('program-time');
    const channelListEl = document.getElementById('channel-list');
    const clockEl = document.getElementById('clock');
    const dateEl = document.getElementById('date-display');

    // ============================================================
    // 工具函数
    // ============================================================

    function timeToMinutes(timeStr) {
        const [h, m] = timeStr.split(':').map(Number);
        return h * 60 + m;
    }

    function getCurrentProgram(channel) {
        const now = new Date();
        const day = now.getDay();
        const currentMinutes = now.getHours() * 60 + now.getMinutes();
        const daySchedule = channel.schedule[day];

        for (let i = 0; i < daySchedule.length; i++) {
            const prog = daySchedule[i];
            const startMin = timeToMinutes(prog.start);
            let endMin = timeToMinutes(prog.end);
            if (endMin === 0) endMin = 1440; // 00:00 means end of day

            if (startMin <= endMin) {
                if (currentMinutes >= startMin && currentMinutes < endMin) {
                    return { ...prog, index: i };
                }
            } else {
                // 跨午夜
                if (currentMinutes >= startMin || currentMinutes < endMin) {
                    return { ...prog, index: i };
                }
            }
        }
        // 默认返回第一个
        return { ...daySchedule[0], index: 0 };
    }

    function getNextProgram(channel) {
        const now = new Date();
        const day = now.getDay();
        const daySchedule = channel.schedule[day];
        const current = getCurrentProgram(channel);
        const nextIndex = (current.index + 1) % daySchedule.length;
        return daySchedule[nextIndex];
    }

    function getProgramProgress(program) {
        const now = new Date();
        const currentMinutes = now.getHours() * 60 + now.getMinutes() + now.getSeconds() / 60;
        const startMin = timeToMinutes(program.start);
        let endMin = timeToMinutes(program.end);
        if (endMin === 0) endMin = 1440;

        const duration = endMin - startMin;
        const elapsed = currentMinutes - startMin;
        return Math.max(0, Math.min(1, elapsed / duration));
    }

    function getSecondsUntilProgramEnd(program) {
        const now = new Date();
        const currentSeconds = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
        let endMin = timeToMinutes(program.end);
        if (endMin === 0) endMin = 1440;
        const endSeconds = endMin * 60;
        return Math.max(0, endSeconds - currentSeconds);
    }

    // ============================================================
    // 雪花效果
    // ============================================================

    function resizeStaticCanvas() {
        staticCanvas.width = staticCanvas.offsetWidth || 640;
        staticCanvas.height = staticCanvas.offsetHeight || 480;
    }

    function drawStatic() {
        const w = staticCanvas.width;
        const h = staticCanvas.height;
        const imageData = staticCtx.createImageData(w, h);
        const data = imageData.data;

        for (let i = 0; i < data.length; i += 4) {
            const val = Math.random() * 255;
            data[i] = val;
            data[i + 1] = val;
            data[i + 2] = val;
            data[i + 3] = 255;
        }

        staticCtx.putImageData(imageData, 0, 0);
        staticAnimFrame = requestAnimationFrame(drawStatic);
    }

    function showStatic() {
        resizeStaticCanvas();
        staticOverlay.classList.add('active');
        drawStatic();
    }

    function hideStatic() {
        staticOverlay.classList.remove('active');
        if (staticAnimFrame) {
            cancelAnimationFrame(staticAnimFrame);
            staticAnimFrame = null;
        }
    }

    // ============================================================
    // 模拟视频播放（使用Canvas生成测试画面）
    // ============================================================

    let simulatedVideoCanvas = null;
    let simulatedVideoCtx = null;
    let simulatedAnimFrame = null;

    function createSimulatedVideo(program, channel) {
        if (!simulatedVideoCanvas) {
            simulatedVideoCanvas = document.createElement('canvas');
            simulatedVideoCanvas.width = 640;
            simulatedVideoCanvas.height = 480;
            simulatedVideoCtx = simulatedVideoCanvas.getContext('2d');
        }

        // 停止之前的动画
        if (simulatedAnimFrame) {
            cancelAnimationFrame(simulatedAnimFrame);
        }

        const colors = {
            'news_morning': '#1a237e',
            'news_noon': '#0d47a1',
            'news_evening': '#1b5e20',
            'drama_ep1': '#4a148c',
            'drama_ep2': '#880e4f',
            'drama_ep3': '#311b92',
            'movie_action': '#b71c1c',
            'movie_comedy': '#f57f17',
            'movie_scifi': '#006064',
            'cartoon_morning': '#ff6f00',
            'cartoon_afternoon': '#2e7d32',
            'cartoon_evening': '#6a1b9a',
            'sports_live': '#1b5e20',
            'sports_replay': '#33691e',
            'documentary': '#3e2723',
            'variety_show': '#e65100',
            'ad_slot_1': '#37474f',
            'ad_slot_2': '#455a64',
            'ad_slot_3': '#546e7a',
        };

        const bgColor = colors[program.id] || '#333';

        function renderFrame() {
            const ctx = simulatedVideoCtx;
            const w = 640, h = 480;
            const time = Date.now() / 1000;

            // 背景
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, w, h);

            // 动态效果 - 波纹
            ctx.save();
            ctx.globalAlpha = 0.1;
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.arc(
                    w/2 + Math.sin(time + i) * 100,
                    h/2 + Math.cos(time * 0.7 + i) * 80,
                    50 + i * 30 + Math.sin(time * 2) * 10,
                    0, Math.PI * 2
                );
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            ctx.restore();

            // 频道名
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 24px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText(channel.name, w/2, 60);

            // 节目名
            ctx.font = 'bold 36px Courier New';
            ctx.fillStyle = '#ffd700';
            ctx.fillText(program.title, w/2, h/2 - 20);

            // 当前时间
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
            ctx.font = '20px Courier New';
            ctx.fillStyle = '#0f0';
            ctx.fillText(timeStr, w/2, h/2 + 30);

            // 节目时间
            ctx.font = '16px Courier New';
            ctx.fillStyle = '#aaa';
            ctx.fillText(`${program.start} - ${program.end}`, w/2, h/2 + 60);

            // 进度条
            const progress = getProgramProgress(program);
            const barWidth = 400;
            const barX = (w - barWidth) / 2;
            const barY = h - 60;
            ctx.fillStyle = '#333';
            ctx.fillRect(barX, barY, barWidth, 8);
            ctx.fillStyle = '#ffd700';
            ctx.fillRect(barX, barY, barWidth * progress, 8);

            // 广告标识
            if (program.isAd) {
                ctx.fillStyle = 'rgba(255, 165, 0, 0.3)';
                ctx.fillRect(0, 0, w, h);
                ctx.font = 'bold 48px Courier New';
                ctx.fillStyle = '#fff';
                ctx.fillText('[ 广告 ]', w/2, h/2 + 100);
            }

            // 推流到视频元素
            const stream = simulatedVideoCanvas.captureStream(30);
            if (videoEl.srcObject !== stream) {
                videoEl.srcObject = stream;
                videoEl.play().catch(() => {});
            }

            simulatedAnimFrame = requestAnimationFrame(renderFrame);
        }

        renderFrame();
    }

    // ============================================================
    // 频道切换
    // ============================================================

    function switchChannel(newIndex, immediate = false) {
        if (isSwitching || newIndex === currentChannelIndex) return;
        if (newIndex < 0 || newIndex >= CHANNELS.length) return;

        isSwitching = true;
        const channel = CHANNELS[newIndex];
        const program = getCurrentProgram(channel);

        if (immediate) {
            currentChannelIndex = newIndex;
            playProgram(channel, program);
            updateUI();
            isSwitching = false;
            return;
        }

        // 模拟延迟 + 雪花效果
        showStatic();
        const screen = document.getElementById('screen');
        screen.classList.add('flickering');

        // 随机延迟 300-800ms
        const delay = 300 + Math.random() * 500;

        setTimeout(() => {
            currentChannelIndex = newIndex;
            playProgram(channel, program);
            hideStatic();
            screen.classList.remove('flickering');
            updateUI();
            showChannelBadge(channel);
            showProgramInfo(program);
            isSwitching = false;
        }, delay);
    }

    function playProgram(channel, program) {
        createSimulatedVideo(program, channel);

        // 更新广告标识
        if (program.isAd) {
            adBadge.classList.add('visible');
        } else {
            adBadge.classList.remove('visible');
        }
    }

    // ============================================================
    // UI 更新
    // ============================================================

    function showChannelBadge(channel) {
        channelBadge.textContent = `CH ${String(channel.id).padStart(2, '0')}`;
        channelBadge.classList.add('visible');
        clearTimeout(badgeTimeout);
        badgeTimeout = setTimeout(() => {
            channelBadge.classList.remove('visible');
        }, 3000);
    }

    function showProgramInfo(program) {
        programTitle.textContent = program.title;
        programTime.textContent = `${program.start} ~ ${program.end}`;
        programInfo.classList.add('visible');
        clearTimeout(infoTimeout);
        infoTimeout = setTimeout(() => {
            programInfo.classList.remove('visible');
        }, 4000);
    }

    function updateUI() {
        // 更新频道列表
        const items = channelListEl.querySelectorAll('.channel-item');
        items.forEach((item, idx) => {
            item.classList.toggle('active', idx === currentChannelIndex);
            const nowPlaying = item.querySelector('.channel-now-playing');
            const prog = getCurrentProgram(CHANNELS[idx]);
            nowPlaying.textContent = prog.title;
        });
    }

    function updateClock() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
        clockEl.textContent = timeStr;

        const days = ['日', '一', '二', '三', '四', '五', '六'];
        const dateStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 星期${days[now.getDay()]}`;
        dateEl.textContent = dateStr;
    }

    // ============================================================
    // 自动续播逻辑
    // ============================================================

    let lastProgramIndex = -1;

    function checkProgramChange() {
        const channel = CHANNELS[currentChannelIndex];
        const program = getCurrentProgram(channel);

        if (program.index !== lastProgramIndex) {
            lastProgramIndex = program.index;
            playProgram(channel, program);
            showProgramInfo(program);

            if (program.isAd) {
                adBadge.classList.add('visible');
            } else {
                adBadge.classList.remove('visible');
            }
        }

        updateUI();
    }

    // ============================================================
    // 初始化
    // ============================================================

    function initChannelList() {
        CHANNELS.forEach((channel, idx) => {
            const li = document.createElement('li');
            li.className = 'channel-item' + (idx === 0 ? ' active' : '');
            li.innerHTML = `
                <div class="channel-number">${channel.id}</div>
                <div>
                    <div class="channel-name">${channel.name}</div>
                    <div class="channel-now-playing">--</div>
                </div>
            `;
            li.addEventListener('click', () => switchChannel(idx));
            channelListEl.appendChild(li);
        });
    }

    function init() {
        initChannelList();
        resizeStaticCanvas();

        // 开机动画
        const screen = document.getElementById('screen');
        screen.classList.add('turning-on');
        showStatic();

        setTimeout(() => {
            hideStatic();
            screen.classList.remove('turning-on');

            const channel = CHANNELS[currentChannelIndex];
            const program = getCurrentProgram(channel);
            lastProgramIndex = program.index;
            playProgram(channel, program);
            showChannelBadge(channel);
            showProgramInfo(program);
            updateUI();
        }, 800);

        // 时钟更新
        updateClock();
        setInterval(updateClock, 1000);

        // 节目切换检测（每秒检查）
        setInterval(checkProgramChange, 1000);
    }

    // ============================================================
    // 键盘控制
    // ============================================================

    document.addEventListener('keydown', (e) => {
        switch(e.key) {
            case 'ArrowUp':
                e.preventDefault();
                switchChannel(currentChannelIndex - 1);
                break;
            case 'ArrowDown':
                e.preventDefault();
                switchChannel(currentChannelIndex + 1);
                break;
            case '1':
            case '2':
            case '3':
            case '4':
                switchChannel(parseInt(e.key) - 1);
                break;
            case ' ':
                e.preventDefault();
                videoEl.muted = !videoEl.muted;
                break;
        }
    });

    // 启动
    window.addEventListener('load', init);
    window.addEventListener('resize', resizeStaticCanvas);
    </script>
