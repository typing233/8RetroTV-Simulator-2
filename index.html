<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>复古电视模拟器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .tv-room {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            padding: 20px;
        }

        .tv-cabinet {
            background: linear-gradient(145deg, #8B4513, #654321, #3d2b1f);
            border-radius: 20px;
            padding: 40px 35px 60px;
            box-shadow:
                0 20px 60px rgba(0,0,0,0.8),
                inset 0 2px 4px rgba(255,255,255,0.1),
                inset 0 -2px 4px rgba(0,0,0,0.3);
            position: relative;
        }

        .tv-cabinet::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            height: 3px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            border-radius: 50%;
        }

        .tv-brand {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #d4a853;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .screen-bezel {
            background: #111;
            border-radius: 12px;
            padding: 15px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.9);
        }

        .screen-container {
            position: relative;
            width: 640px;
            height: 480px;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }

        #video-player {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .scanlines {
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 1px,
                rgba(0, 0, 0, 0.15) 1px,
                rgba(0, 0, 0, 0.15) 2px
            );
        }

        .vignette {
            background: radial-gradient(
                ellipse at center,
                transparent 60%,
                rgba(0, 0, 0, 0.6) 100%
            );
        }

        .screen-curve {
            box-shadow: inset 0 0 80px rgba(0,0,0,0.4);
            border-radius: 8px;
        }

        .static-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.1s;
            background: #111;
        }

        .static-overlay.active {
            opacity: 1;
        }

        .static-overlay canvas {
            width: 100%;
            height: 100%;
        }

        .noise-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            mix-blend-mode: overlay;
        }

        .noise-overlay.active {
            opacity: 1;
        }

        .channel-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 15;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 18px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        .channel-badge.visible {
            opacity: 1;
        }

        .channel-logo {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 14;
            padding: 4px 10px;
            border-radius: 3px;
            font-size: 13px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
            letter-spacing: 1px;
        }

        .channel-logo.visible {
            opacity: 0.85;
        }

        .channel-logo.hidden {
            opacity: 0;
        }

        .program-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 15;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            color: #fff;
            padding: 30px 15px 10px;
            font-size: 13px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .program-info.visible {
            opacity: 1;
        }

        .program-info .program-title {
            font-size: 15px;
            font-weight: bold;
            color: #ffd700;
        }

        .program-info .program-time {
            color: #aaa;
            margin-top: 3px;
        }

        .ad-placeholder-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 15;
            background: rgba(255, 165, 0, 0.8);
            color: #000;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .ad-placeholder-badge.visible {
            opacity: 1;
        }

        .next-program-banner {
            position: absolute;
            bottom: 50px;
            left: 0;
            right: 0;
            z-index: 16;
            background: linear-gradient(90deg, rgba(0,0,0,0.92) 0%, rgba(30,30,60,0.92) 100%);
            color: #fff;
            padding: 10px 15px;
            font-size: 12px;
            transform: translateY(100%);
            opacity: 0;
            transition: transform 0.4s ease-out, opacity 0.4s;
            border-top: 2px solid #ffd700;
        }

        .next-program-banner.visible {
            transform: translateY(0);
            opacity: 1;
        }

        .next-program-banner .banner-label {
            color: #ffd700;
            font-size: 10px;
            margin-bottom: 3px;
        }

        .next-program-banner .banner-title {
            font-weight: bold;
            font-size: 13px;
        }

        .next-program-banner .banner-time {
            color: #aaa;
            font-size: 11px;
            margin-top: 2px;
        }

        .channel-panel {
            background: linear-gradient(145deg, #2d2d44, #1e1e32);
            border-radius: 12px;
            padding: 20px;
            min-width: 280px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .panel-title {
            color: #ffd700;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
        }

        .channel-list {
            list-style: none;
        }

        .channel-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            margin-bottom: 6px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            color: #ccc;
        }

        .channel-item:hover {
            background: rgba(255, 215, 0, 0.1);
            color: #fff;
        }

        .channel-item.active {
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .channel-number {
            background: #333;
            color: #ffd700;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .channel-name {
            font-size: 14px;
        }

        .channel-now-playing {
            font-size: 11px;
            color: #888;
            margin-top: 2px;
        }

        .time-display {
            text-align: center;
            color: #0f0;
            font-size: 20px;
            margin-top: 15px;
            padding: 10px;
            background: #111;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        .time-display .date {
            font-size: 12px;
            color: #0a0;
            margin-top: 4px;
        }

        .time-display .sim-label {
            font-size: 10px;
            color: #f80;
            margin-top: 4px;
            display: none;
        }

        .time-display .sim-label.active {
            display: block;
        }

        .sim-panel {
            margin-top: 15px;
            border-top: 1px solid #444;
            padding-top: 12px;
        }

        .sim-panel-title {
            color: #888;
            font-size: 11px;
            text-align: center;
            margin-bottom: 8px;
        }

        .sim-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
        }

        .sim-row label {
            color: #999;
            font-size: 11px;
            width: 36px;
            flex-shrink: 0;
        }

        .sim-row select, .sim-row input {
            background: #222;
            color: #ccc;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 4px 6px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            flex: 1;
        }

        .sim-buttons {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .sim-btn {
            flex: 1;
            background: #333;
            color: #ccc;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 6px 8px;
            font-size: 11px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.2s;
        }

        .sim-btn:hover {
            background: #444;
            color: #fff;
        }

        .sim-btn.active {
            background: #553300;
            color: #ffd700;
            border-color: #ffd700;
        }

        .sim-btn.reset {
            background: #1a3320;
            color: #0f0;
            border-color: #0f0;
        }

        .effects-panel {
            margin-top: 12px;
            border-top: 1px solid #444;
            padding-top: 10px;
        }

        .effects-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 0;
            color: #999;
            font-size: 11px;
        }

        .toggle-switch {
            width: 34px;
            height: 17px;
            background: #333;
            border-radius: 9px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
            border: 1px solid #555;
        }

        .toggle-switch.on {
            background: #553300;
            border-color: #ffd700;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 11px;
            height: 11px;
            background: #888;
            border-radius: 50%;
            transition: transform 0.3s, background 0.3s;
        }

        .toggle-switch.on::after {
            transform: translateX(17px);
            background: #ffd700;
        }

        .schedule-btn {
            width: 100%;
            margin-top: 10px;
            background: #2a2a44;
            color: #ccc;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 8px;
            font-size: 12px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.2s;
            letter-spacing: 2px;
        }

        .schedule-btn:hover {
            background: #3a3a55;
            color: #ffd700;
            border-color: #ffd700;
        }

        .instructions {
            color: #666;
            font-size: 11px;
            text-align: center;
            margin-top: 12px;
            line-height: 1.6;
        }

        /* 节目单模态窗 */
        .schedule-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.88);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .schedule-modal-overlay.open {
            display: flex;
        }

        .schedule-modal {
            background: linear-gradient(145deg, #2d2d44, #1e1e32);
            border-radius: 12px;
            padding: 24px;
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            color: #ccc;
            font-size: 12px;
            border: 1px solid #444;
        }

        .schedule-modal h2 {
            color: #ffd700;
            text-align: center;
            margin-bottom: 16px;
            font-size: 16px;
            letter-spacing: 2px;
        }

        .schedule-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .schedule-tab {
            background: #333;
            color: #ccc;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 5px 10px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            transition: all 0.2s;
        }

        .schedule-tab:hover {
            background: #444;
        }

        .schedule-tab.active {
            background: #553300;
            color: #ffd700;
            border-color: #ffd700;
        }

        .schedule-channel-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 10px;
        }

        .schedule-ch-tab {
            background: #2a2a3a;
            color: #aaa;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 4px 8px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            transition: all 0.2s;
        }

        .schedule-ch-tab.active {
            background: #1a3320;
            color: #0f0;
            border-color: #0f0;
        }

        .schedule-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2px;
        }

        .schedule-row {
            display: grid;
            grid-template-columns: 110px 1fr 50px;
            gap: 8px;
            padding: 6px 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.02);
            align-items: center;
        }

        .schedule-row:hover {
            background: rgba(255,255,255,0.05);
        }

        .schedule-row.ad-row {
            background: rgba(255,165,0,0.08);
        }

        .schedule-row.current-row {
            background: rgba(0,255,0,0.1);
            border: 1px solid rgba(0,255,0,0.3);
        }

        .schedule-row .time-col {
            color: #0f0;
            font-size: 11px;
        }

        .schedule-row .title-col {
            color: #eee;
        }

        .schedule-row .type-col {
            color: #888;
            font-size: 10px;
            text-align: right;
        }

        .schedule-close {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #888;
            font-size: 20px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .schedule-close:hover {
            color: #fff;
        }

        @keyframes tvTurnOn {
            0% {
                transform: scaleY(0.01) scaleX(0.5);
                filter: brightness(5);
            }
            50% {
                transform: scaleY(0.01) scaleX(1);
                filter: brightness(3);
            }
            100% {
                transform: scaleY(1) scaleX(1);
                filter: brightness(1);
            }
        }

        .screen-container.turning-on {
            animation: tvTurnOn 0.5s ease-out;
        }

        @keyframes channelFlicker {
            0%, 100% { opacity: 1; }
            25% { opacity: 0.3; }
            50% { opacity: 0.8; }
            75% { opacity: 0.2; }
        }

        .screen-container.flickering {
            animation: channelFlicker 0.3s ease-in-out;
        }

        @keyframes glitchShake {
            0% { transform: translate(0, 0); filter: none; }
            20% { transform: translate(-3px, 1px); filter: hue-rotate(90deg); }
            40% { transform: translate(2px, -2px); filter: saturate(3); }
            60% { transform: translate(-1px, 2px); filter: hue-rotate(-60deg); }
            80% { transform: translate(3px, -1px); filter: brightness(1.5); }
            100% { transform: translate(0, 0); filter: none; }
        }

        .screen-container.glitching {
            animation: glitchShake 0.2s ease-in-out;
        }

        @media (prefers-reduced-motion: reduce) {
            .screen-container.glitching {
                animation: none;
            }
            .noise-overlay {
                display: none;
            }
        }

        @media (max-width: 1024px) {
            .tv-room {
                flex-direction: column;
                align-items: center;
            }
            .screen-container {
                width: 480px;
                height: 360px;
            }
        }
    </style>
</head>
<body>
    <div class="tv-room">
        <div class="tv-cabinet">
            <div class="screen-bezel">
                <div class="screen-container" id="screen">
                    <video id="video-player" muted playsinline></video>
                    <canvas class="noise-overlay" id="noise-canvas"></canvas>
                    <div class="crt-overlay scanlines"></div>
                    <div class="crt-overlay vignette"></div>
                    <div class="crt-overlay screen-curve"></div>
                    <div class="static-overlay" id="static-overlay">
                        <canvas id="static-canvas"></canvas>
                    </div>
                    <div class="channel-logo" id="channel-logo"></div>
                    <div class="channel-badge" id="channel-badge">CH 01</div>
                    <div class="ad-placeholder-badge" id="ad-badge">广告</div>
                    <div class="program-info" id="program-info">
                        <div class="program-title" id="program-title">--</div>
                        <div class="program-time" id="program-time">--:-- ~ --:--</div>
                    </div>
                    <div class="next-program-banner" id="next-banner">
                        <div class="banner-label">▶ 即将播出</div>
                        <div class="banner-title" id="banner-title">--</div>
                        <div class="banner-time" id="banner-time">--:--</div>
                    </div>
                </div>
            </div>
            <div class="tv-brand">RETRO-VISION</div>
        </div>

        <div class="channel-panel">
            <div class="panel-title">频 道 列 表</div>
            <ul class="channel-list" id="channel-list"></ul>
            <div class="time-display">
                <div id="clock">00:00:00</div>
                <div class="date" id="date-display">----年--月--日 星期-</div>
                <div class="sim-label" id="sim-label">[ 模拟时间 ]</div>
            </div>

            <div class="sim-panel">
                <div class="sim-panel-title">— 演示时间控制 —</div>
                <div class="sim-row">
                    <label>星期</label>
                    <select id="sim-day">
                        <option value="1">周一</option>
                        <option value="2">周二</option>
                        <option value="3">周三</option>
                        <option value="4">周四</option>
                        <option value="5">周五</option>
                        <option value="6">周六</option>
                        <option value="0">周日</option>
                    </select>
                </div>
                <div class="sim-row">
                    <label>时间</label>
                    <input type="time" id="sim-time" value="08:00">
                </div>
                <div class="sim-buttons">
                    <button class="sim-btn" id="sim-apply">跳转模拟</button>
                    <button class="sim-btn reset" id="sim-reset">恢复实时</button>
                </div>
            </div>

            <div class="effects-panel">
                <div class="sim-panel-title">— 效果设置 —</div>
                <div class="effects-toggle">
                    <span>模拟噪点</span>
                    <div class="toggle-switch" id="toggle-noise"></div>
                </div>
                <div class="effects-toggle">
                    <span>随机信号干扰</span>
                    <div class="toggle-switch" id="toggle-glitch"></div>
                </div>
            </div>

            <button class="schedule-btn" id="btn-schedule">节 目 单</button>

            <div class="instructions">
                ↑↓ 或点击切换频道<br>
                数字键 1-9 快速切换<br>
                空格键 静音/取消静音<br>
                G 键 打开节目单
            </div>
        </div>
    </div>

    <div class="schedule-modal-overlay" id="schedule-modal"></div>

    <script>
    // ============================================================
    // 扩展接口规范（第三方注册）
    // ============================================================
    //
    // ## 使用说明
    // 第三方开发者可通过 window.RetroTV 全局对象注册新内容。
    // 在页面加载后（DOMContentLoaded 之后）调用以下方法即可。
    //
    // ## registerChannel(config)
    // 注册新频道。
    // @param {Object} config
    //   - name {string} 必填，频道名称，如 "体育频道"
    //   - shortName {string} 可选，台标简称（最多4字），默认取 name 前4字
    //   - id {number} 可选，频道编号，默认自增
    //   - schedule {Object} 可选，节目表配置
    //     格式A: { weekday: [...], weekend: [...] }
    //     格式B: { 0: [...], 1: [...], ..., 6: [...] } (0=周日)
    //     每条节目: { id: string, title: string, start: 'HH:MM', end: 'HH:MM', isAd?: boolean }
    //   - logo {Object} 可选，台标样式 { text, color, bg }
    // @returns {number|false} 返回频道ID或false
    //
    // ## registerAdPack(timePeriod, ads)
    // 注册广告包到指定时段。
    // @param {string} timePeriod 'morning'|'afternoon'|'evening'|'latenight'
    // @param {Array} ads 广告数组
    //   每条广告: {
    //     id: string,       必填，唯一标识
    //     title: string,    必填，广告标题（显示在角标上）
    //     url: string,      必填，视频URL
    //     duration: number, 可选，播放秒数（默认使用 AD_CONFIG.defaultDuration）
    //     category: string  可选，分类标签如 '家电','零食','饮料'
    //   }
    // @returns {boolean}
    //
    // ## registerSchedule(channelId, daySchedules)
    // 替换或更新指定频道的节目表。
    // @param {number} channelId 频道ID
    // @param {Object} daySchedules
    //   格式A: { weekday: [...], weekend: [...] }
    //   格式B: { 0: [...], 1: [...], ..., 6: [...] }
    //   节目条目格式: { id: string, title: string, start: 'HH:MM', end: 'HH:MM', isAd?: boolean }
    // @returns {boolean}
    //
    // ## registerVideoSources(sources)
    // 注册视频源映射。节目表中的 id 字段将通过此映射找到视频URL。
    // @param {Object} sources  { 'video_id': 'https://...mp4', ... }
    // @returns {boolean}
    //

        registerChannel(config) {
            if (!config || typeof config.name !== 'string' || !config.name.trim()) {
                console.warn('RetroTV.registerChannel: name (string) 为必填字段');
                return false;
            }
            const id = (typeof config.id === 'number' && config.id > 0) ? config.id : (CHANNELS.length + 1);
            if (CHANNELS.find(c => c.id === id)) {
                console.warn(`RetroTV.registerChannel: id=${id} 已存在`);
                return false;
            }

            let schedule;
            if (config.schedule) {
                if (config.schedule.weekday || config.schedule.weekend) {
                    const weekday = Array.isArray(config.schedule.weekday) ? config.schedule.weekday : [];
                    const weekend = Array.isArray(config.schedule.weekend) ? config.schedule.weekend : [];
                    schedule = buildSchedule({ weekday, weekend });
                } else {
                    schedule = {};
                    for (let d = 0; d < 7; d++) {
                        schedule[d] = Array.isArray(config.schedule[d]) ? config.schedule[d] : [];
                    }
                }
            } else {
                schedule = buildSchedule({ weekday: [], weekend: [] });
            }

            const shortName = config.shortName || config.name.slice(0, 4);
            CHANNELS.push({ id, name: config.name, shortName, schedule });

            // 注册台标
            if (config.logo && config.logo.text) {
                CHANNEL_LOGOS[id] = {
                    text: config.logo.text || shortName,
                    color: config.logo.color || '#fff',
                    bg: config.logo.bg || 'rgba(0,0,0,0.5)',
                };
            } else {
                CHANNEL_LOGOS[id] = { text: shortName, color: '#fff', bg: 'rgba(0,0,0,0.5)' };
            }

            if (document.getElementById('channel-list')) {
                renderChannelList();
            }
            this._emit('channelRegistered', { id, name: config.name });
            return id;
        },

        registerAdPack(timePeriod, ads) {
            const validPeriods = ['morning', 'afternoon', 'evening', 'latenight'];
            if (!validPeriods.includes(timePeriod)) {
                console.warn(`RetroTV.registerAdPack: timePeriod 须为 ${validPeriods.join('|')}`);
                return false;
            }
            if (!Array.isArray(ads) || ads.length === 0) {
                console.warn('RetroTV.registerAdPack: ads 须为非空数组');
                return false;
            }
            let added = 0;
            ads.forEach(ad => {
                if (!ad.id || !ad.url || !ad.title) {
                    console.warn('RetroTV.registerAdPack: 每条广告须含 id, title, url 字段，跳过:', ad);
                    return;
                }
                if (AD_LIBRARY[timePeriod].find(a => a.id === ad.id)) {
                    return; // 去重
                }
                AD_LIBRARY[timePeriod].push({
                    id: ad.id,
                    title: ad.title,
                    url: ad.url,
                    duration: (typeof ad.duration === 'number' && ad.duration > 0) ? ad.duration : AD_CONFIG.defaultDuration,
                    category: ad.category || '',
                });
                added++;
            });
            this._emit('adPackRegistered', { timePeriod, count: added });
            return added > 0;
        },

        registerSchedule(channelId, daySchedules) {
            if (typeof channelId !== 'number') {
                console.warn('RetroTV.registerSchedule: channelId 须为数字');
                return false;
            }
            const ch = CHANNELS.find(c => c.id === channelId);
            if (!ch) {
                console.warn(`RetroTV.registerSchedule: 频道 id=${channelId} 不存在`);
                return false;
            }
            if (!daySchedules || typeof daySchedules !== 'object') {
                console.warn('RetroTV.registerSchedule: daySchedules 须为对象');
                return false;
            }
            if (daySchedules.weekday || daySchedules.weekend) {
                const weekday = Array.isArray(daySchedules.weekday) ? daySchedules.weekday : [];
                const weekend = Array.isArray(daySchedules.weekend) ? daySchedules.weekend : [];
                ch.schedule = buildSchedule({ weekday, weekend });
            } else {
                Object.keys(daySchedules).forEach(day => {
                    const d = parseInt(day);
                    if (d >= 0 && d <= 6 && Array.isArray(daySchedules[day])) {
                        ch.schedule[d] = daySchedules[day];
                    }
                });
            }
            this._emit('scheduleRegistered', { channelId });
            return true;
        },

        registerVideoSources(sources) {
            if (!sources || typeof sources !== 'object') {
                console.warn('RetroTV.registerVideoSources: sources 须为对象 { id: url }');
                return false;
            }
            let added = 0;
            Object.entries(sources).forEach(([id, url]) => {
                if (typeof id === 'string' && typeof url === 'string' && url.trim()) {
                    VIDEO_SOURCES[id] = url;
                    added++;
                }
            });
            return added > 0;
        },

        getChannels() {
            return CHANNELS.map(c => ({
                id: c.id,
                name: c.name,
                shortName: c.shortName,
                scheduleDays: Object.keys(c.schedule).length
            }));
        },

        getAdLibrary() {
            return JSON.parse(JSON.stringify(AD_LIBRARY));
        },

        getCurrentState() {
            return {
                channelIndex: currentChannelIndex,
                channel: CHANNELS[currentChannelIndex],
                program: getCurrentProgram(CHANNELS[currentChannelIndex]),
                time: getNow(),
                simulated: simulatedTime !== null,
                adPlaying: currentAdPlaying,
            };
        },

        on(event, callback) {
            if (typeof callback !== 'function') return;
            if (!_retroListeners[event]) _retroListeners[event] = [];
            _retroListeners[event].push(callback);
        },

        off(event, callback) {
            if (!_retroListeners[event]) return;
            _retroListeners[event] = _retroListeners[event].filter(cb => cb !== callback);
        },

        _emit(event, data) {
            if (_retroListeners[event]) {
                _retroListeners[event].forEach(cb => {
                    try { cb(data); } catch(e) { console.warn('RetroTV listener error:', e); }
                });
            }
        }
    };

    let adPlayHistory = [];

    function getTimePeriod(now) {
        const h = now.getHours();
        if (h >= 6 && h < 12) return 'morning';
        if (h >= 12 && h < 18) return 'afternoon';
        if (h >= 18 && h < 24) return 'evening';
        return 'latenight';
    }

    function selectAdForSlot() {
        const period = getTimePeriod(getNow());
        const pool = AD_LIBRARY[period];
        if (!pool || pool.length === 0) return null;

        let candidates = pool.filter(ad => !adPlayHistory.includes(ad.id));
        if (candidates.length === 0) {
            adPlayHistory = [];
            candidates = pool;
        }

        const selected = candidates[Math.floor(Math.random() * candidates.length)];
        adPlayHistory.push(selected.id);
        if (adPlayHistory.length > AD_CONFIG.historySize) {
            adPlayHistory.shift();
        }

        currentAdPlaying = selected;
        window.RetroTV._emit('adPlay', { ad: selected, period });
        return selected;
    }

    function clearAdTimer() {
        if (adDurationTimer) {
            clearTimeout(adDurationTimer);
            adDurationTimer = null;
        }
    }

    function startAdTimer(ad) {
        clearAdTimer();
        const duration = (ad.duration || AD_CONFIG.defaultDuration) * 1000;

            adDurationTimer = null;
            if (!currentAdPlaying) return;
            const channel = CHANNELS[currentChannelIndex];

            const progKey = `${currentChannelIndex}:${currentProg.index}`;

            if (progKey === currentProgramKey && currentProg.isAd) {

                    videoEl.load();
                    videoEl.play().catch(() => {});

                    startAdTimer({ duration: AD_CONFIG.defaultDuration });
                }
            } else {
                currentAdPlaying = null;
                adBadge.classList.remove('visible');
            }
        }, duration);
    }

    // ============================================================
    // 工具函数
    // ============================================================
    function timeToMinutes(timeStr) {
        const [h, m] = timeStr.split(':').map(Number);
        return h * 60 + m;
    }

    function getCurrentProgram(channel) {
        const now = getNow();
        const day = now.getDay();
        const currentMinutes = now.getHours() * 60 + now.getMinutes();
        const daySchedule = channel.schedule[day];

        for (let i = 0; i < daySchedule.length; i++) {
            const prog = daySchedule[i];
            const startMin = timeToMinutes(prog.start);
            let endMin = timeToMinutes(prog.end);
            if (endMin === 0) endMin = 1440;

            if (startMin <= endMin) {
                if (currentMinutes >= startMin && currentMinutes < endMin) {
                    return { ...prog, index: i, daySchedule };
                }
            } else {
                if (currentMinutes >= startMin || currentMinutes < endMin) {
                    return { ...prog, index: i, daySchedule };
                }
            }
        }
        return { ...daySchedule[0], index: 0, daySchedule };
    }

    function getNextProgramInSchedule(channel, currentIndex) {
        const now = getNow();
        const day = now.getDay();
        const daySchedule = channel.schedule[day];
        const nextIndex = (currentIndex + 1) % daySchedule.length;
        return { ...daySchedule[nextIndex], index: nextIndex, daySchedule };
    }

    // ============================================================

    function resizeStaticCanvas() {
        staticCanvas.width = staticCanvas.offsetWidth || 640;
        staticCanvas.height = staticCanvas.offsetHeight || 480;
        noiseCanvas.width = noiseCanvas.offsetWidth || 640;
        noiseCanvas.height = noiseCanvas.offsetHeight || 480;
    }

    function drawStatic() {
        const w = staticCanvas.width;
        const h = staticCanvas.height;
        const imageData = staticCtx.createImageData(w, h);
        const data = imageData.data;
        for (let i = 0; i < data.length; i += 4) {
            const val = Math.random() * 255;
            data[i] = val;
            data[i + 1] = val;
            data[i + 2] = val;
            data[i + 3] = 255;
        }
        staticCtx.putImageData(imageData, 0, 0);
        staticAnimFrame = requestAnimationFrame(drawStatic);
    }

    function showStatic() {
        resizeStaticCanvas();
        staticOverlay.classList.add('active');
        drawStatic();
    }

    function hideStatic() {
        staticOverlay.classList.remove('active');
        if (staticAnimFrame) {
            cancelAnimationFrame(staticAnimFrame);
            staticAnimFrame = null;
        }
    }

    // ============================================================
    // 模拟噪点效果
    // ============================================================
    function drawNoise() {
        if (!EFFECTS_CONFIG.analogNoise.enabled) return;
        const w = noiseCanvas.width;
        const h = noiseCanvas.height;
        const imageData = noiseCtx.createImageData(w, h);
        const data = imageData.data;
        const intensity = EFFECTS_CONFIG.analogNoise.intensity;
        const threshold = intensity * 255;

        for (let i = 0; i < data.length; i += 4) {
            if (Math.random() * 255 < threshold) {
                const val = Math.random() * 200 + 55;
                data[i] = val;
                data[i + 1] = val;
                data[i + 2] = val;
                data[i + 3] = 120;
            }
        }
        noiseCtx.putImageData(imageData, 0, 0);
    }

    function startNoise() {
        EFFECTS_CONFIG.analogNoise.enabled = true;
        noiseCanvas.classList.add('active');
        if (noiseTimer) clearInterval(noiseTimer);
        noiseTimer = setInterval(drawNoise, 100);
        drawNoise();
    }

    function stopNoise() {
        EFFECTS_CONFIG.analogNoise.enabled = false;
        noiseCanvas.classList.remove('active');
        if (noiseTimer) {
            clearInterval(noiseTimer);
            noiseTimer = null;
        }
        noiseCtx.clearRect(0, 0, noiseCanvas.width, noiseCanvas.height);
    }

        const min = EFFECTS_CONFIG.randomGlitch.intervalMin;
        const max = EFFECTS_CONFIG.randomGlitch.intervalMax;
        const delay = min + Math.random() * (max - min);
        glitchTimer = setTimeout(() => {
            if (EFFECTS_CONFIG.randomGlitch.enabled) {
                triggerGlitch();
                scheduleNextGlitch();
            }
        }, delay);
    }

    function startGlitch() {
        EFFECTS_CONFIG.randomGlitch.enabled = true;
        scheduleNextGlitch();

    function checkUpcomingBanner() {
        const channel = CHANNELS[currentChannelIndex];
        const program = getCurrentProgram(channel);
        if (!program || program.isAd) return;

        const now = getNow();
        const currentSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
        let endMin = timeToMinutes(program.end);
        if (endMin === 0) endMin = 1440;
        const endSec = endMin * 60;

        const remaining = endSec - currentSec;
        const progKey = `${currentChannelIndex}:${program.index}`;

        if (remaining > 0 && remaining <= BANNER_CONFIG.showBeforeEnd && bannerShownForKey !== progKey) {
            const nextProg = getNextProgramInSchedule(channel, program.index);
            if (nextProg && !nextProg.isAd) {
                bannerShownForKey = progKey;
                showNextBanner(nextProg);
            }
        }
    }

        bannerTitleEl.textContent = nextProgram.title;
        bannerTimeEl.textContent = `${nextProgram.start} ~ ${nextProgram.end}`;
        nextBanner.classList.add('visible');

        bannerTimeout = setTimeout(() => {

    // ============================================================
    // 频道预加载
    // ============================================================
    const preloadPool = new Map(); // channelIndex -> { el: HTMLVideoElement, url: string }

    function updatePreloadPool() {
        const total = CHANNELS.length;
        if (total < 2) return;
        const prevIdx = (currentChannelIndex - 1 + total) % total;
        const nextIdx = (currentChannelIndex + 1) % total;
        const needed = new Set([prevIdx, nextIdx]);

        // 清理不再需要的预加载元素
        preloadPool.forEach((entry, idx) => {
            if (!needed.has(idx)) {
                entry.el.pause();
                entry.el.removeAttribute('src');
                entry.el.load();
                entry.el.remove();
                preloadPool.delete(idx);
            }
        });

        // 为相邻频道创建或更新预加载
        needed.forEach(idx => {
            if (idx === currentChannelIndex) return;
            const ch = CHANNELS[idx];
            if (!ch) return;
            const prog = getCurrentProgram(ch);
            let url;
            if (prog.isAd) {
                const period = getTimePeriod(getNow());
                const pool = AD_LIBRARY[period];
                url = pool && pool.length > 0 ? pool[0].url : VIDEO_SOURCES[prog.id];
            } else {
                url = VIDEO_SOURCES[prog.id];
            }
            if (!url) return;

            let entry = preloadPool.get(idx);
            if (!entry) {
                const el = document.createElement('video');
                el.muted = true;
                el.preload = 'auto';
                el.style.cssText = 'position:absolute;width:0;height:0;opacity:0;pointer-events:none;';
                document.body.appendChild(el);
                entry = { el, url: '' };
                preloadPool.set(idx, entry);
            }
            if (entry.url !== url) {
                entry.el.src = url;
                entry.url = url;
                entry.el.load();
            }
        });
    }

    function getPreloadedUrl(channelIndex) {
        const entry = preloadPool.get(channelIndex);
        if (!entry) return null;
        // 检查是否已缓冲足够数据
        if (entry.el.readyState >= 3) {
            return entry.url;
        }
        return entry.url; // 即使未完全缓冲，浏览器缓存也能加速
    }

    function consumePreload(channelIndex) {
        const entry = preloadPool.get(channelIndex);
        if (!entry) return null;
        const url = entry.url;
        // 停止预加载元素，保留在池中待 updatePreloadPool 清理
        entry.el.pause();
        return url;
    }

    // ============================================================
    // 视频播放（集成广告引擎 + 时长控制）
    // ============================================================
    function playVideoForProgram(program) {
        clearAdTimer();
        let url;

        if (program.isAd) {
            const ad = selectAdForSlot();
            if (ad) {
                url = ad.url;
                adBadge.textContent = `广告 · ${ad.title}`;
                adBadge.classList.add('visible');
                startAdTimer(ad);
            } else {
                url = VIDEO_SOURCES[program.id];
                adBadge.textContent = '广告';
                adBadge.classList.add('visible');
            }
        } else {
            url = VIDEO_SOURCES[program.id];
            adBadge.classList.remove('visible');
            currentAdPlaying = null;
        }

        if (!url) {
            console.warn('No video URL for program:', program.id);
            return;
        }

        if (videoEl.srcObject) {
            videoEl.srcObject = null;
        }

        videoEl.src = url;
        videoEl.load();
        videoEl.play().catch(e => {
            console.log('Autoplay blocked:', e.message);
        });
    }

    // ============================================================
    // 视频结束事件
    // ============================================================
    videoEl.addEventListener('ended', () => {
        const channel = CHANNELS[currentChannelIndex];
        const currentProg = getCurrentProgram(channel);
        const progKey = `${currentChannelIndex}:${currentProg.index}`;

        if (progKey === currentProgramKey) {
            if (currentProg.isAd && adDurationTimer) {
                // 视频比广告配置时长短，循环播放直到 timer 触发切换
                videoEl.currentTime = 0;
                videoEl.play().catch(() => {});
            } else if (currentProg.isAd) {
                // 没有 timer（异常兜底），选下一条广告
                const ad = selectAdForSlot();
                if (ad) {
                    videoEl.src = ad.url;
                    videoEl.load();
                    videoEl.play().catch(() => {});
                    adBadge.textContent = `广告 · ${ad.title}`;
                    startAdTimer(ad);
                    return;
                }
                videoEl.currentTime = 0;
                videoEl.play().catch(() => {});
            } else {
                // 普通节目循环
                videoEl.currentTime = 0;
                videoEl.play().catch(() => {});
            }
        } else {
            advanceToProgram(currentProg);
        }
    });

    function advanceToProgram(program) {
        currentProgramKey = `${currentChannelIndex}:${program.index}`;
        playVideoForProgram(program);
        showProgramInfo(program);
        window.RetroTV._emit('programChange', {
            channel: CHANNELS[currentChannelIndex],
            program: program
        });
    }

    // ============================================================
    // 频道切换（集成预加载+台标）
    // ============================================================
    function playVideoWithPreload(program, channelIdx) {
        clearAdTimer();
        let url;

        if (program.isAd) {
            const ad = selectAdForSlot();
            if (ad) {
                url = ad.url;
                adBadge.textContent = `广告 · ${ad.title}`;
                adBadge.classList.add('visible');
                startAdTimer(ad);
            } else {
                url = VIDEO_SOURCES[program.id];
                adBadge.textContent = '广告';
                adBadge.classList.add('visible');
            }
        } else {
            // 尝试使用预加载的资源
            const preloadedUrl = consumePreload(channelIdx);
            if (preloadedUrl) {
                url = preloadedUrl;
            } else {
                url = VIDEO_SOURCES[program.id];
            }
            adBadge.classList.remove('visible');
            currentAdPlaying = null;
        }

        if (!url) {
            console.warn('No video URL for program:', program.id);
            return;
        }

        if (videoEl.srcObject) {
            videoEl.srcObject = null;
        }

        videoEl.src = url;
        videoEl.load();
        videoEl.play().catch(e => {
            console.log('Autoplay blocked:', e.message);
        });
    }

    function switchChannel(newIndex, immediate = false) {
        if (isSwitching) return;
        if (newIndex < 0 || newIndex >= CHANNELS.length) return;
        if (newIndex === currentChannelIndex && !immediate) return;

        isSwitching = true;
        const channel = CHANNELS[newIndex];
        const program = getCurrentProgram(channel);

        hideNextBanner();
        bannerShownForKey = null;

        if (immediate) {
            currentChannelIndex = newIndex;
            currentProgramKey = `${newIndex}:${program.index}`;
            playVideoWithPreload(program, newIndex);
            updateUI();
            showChannelLogo(channel);
            isSwitching = false;
            setTimeout(updatePreloadPool, 500);
            return;
        }

        videoEl.pause();
        showStatic();
        const screen = document.getElementById('screen');
        screen.classList.add('flickering');

        const hasPreload = preloadPool.has(newIndex);
        const delay = hasPreload ? 120 + Math.random() * 150 : 300 + Math.random() * 500;

        setTimeout(() => {
            currentChannelIndex = newIndex;
            currentProgramKey = `${newIndex}:${program.index}`;
            playVideoWithPreload(program, newIndex);
            hideStatic();
            screen.classList.remove('flickering');
            updateUI();
            showChannelBadge(channel);
            showChannelLogo(channel);
            showProgramInfo(program);
            isSwitching = false;

            window.RetroTV._emit('channelChange', {
                channel: channel,
                program: program
            });

            setTimeout(updatePreloadPool, 300);
        }, delay);
    }

    // ============================================================
    // UI
    // ============================================================
    function showChannelBadge(channel) {
        channelBadge.textContent = `CH ${String(channel.id).padStart(2, '0')}`;
        channelBadge.classList.add('visible');
        clearTimeout(badgeTimeout);
        badgeTimeout = setTimeout(() => {
            channelBadge.classList.remove('visible');
        }, 3000);
    }

    function showProgramInfo(program) {
        programTitle.textContent = program.title;
        programTime.textContent = `${program.start} ~ ${program.end}`;
        programInfo.classList.add('visible');
        clearTimeout(infoTimeout);
        infoTimeout = setTimeout(() => {
            programInfo.classList.remove('visible');
        }, 4000);
    }

    function updateUI() {
        const items = channelListEl.querySelectorAll('.channel-item');
        items.forEach((item, idx) => {
            item.classList.toggle('active', idx === currentChannelIndex);
            const nowPlaying = item.querySelector('.channel-now-playing');
            if (idx < CHANNELS.length) {
                const prog = getCurrentProgram(CHANNELS[idx]);
                nowPlaying.textContent = prog.title;
            }
        });
    }

    function updateClock() {
        const now = getNow();
        const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
        clockEl.textContent = timeStr;

        const days = ['日', '一', '二', '三', '四', '五', '六'];
        const dateStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 星期${days[now.getDay()]}`;
        dateEl.textContent = dateStr;

        simLabel.classList.toggle('active', simulatedTime !== null);
    }

    // ============================================================
    // 节目轮询 + 横幅检测
    // ============================================================
    function checkScheduledProgramChange() {
        const channel = CHANNELS[currentChannelIndex];
        const program = getCurrentProgram(channel);
        const progKey = `${currentChannelIndex}:${program.index}`;

        if (progKey !== currentProgramKey) {
            currentProgramKey = progKey;
            playVideoForProgram(program);
            showProgramInfo(program);
            bannerShownForKey = null;
            window.RetroTV._emit('programChange', { channel, program });
        }

        checkUpcomingBanner();
        updateUI();
    }

    // ============================================================
    // 每周节目单
    // ============================================================
    function buildScheduleModal() {
        const modal = document.getElementById('schedule-modal');
        const dayNames = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
        const now = getNow();
        const today = now.getDay();

        let html = `<div class="schedule-modal" style="position:relative;">
            <span class="schedule-close" id="schedule-close">&times;</span>
            <h2>每 周 节 目 单</h2>
            <div class="schedule-tabs" id="schedule-day-tabs">`;

        for (let i = 0; i < 7; i++) {
            const dayIdx = (today + i) % 7;
            const label = i === 0 ? `${dayNames[dayIdx]}(今天)` : dayNames[dayIdx];
            html += `<div class="schedule-tab${i === 0 ? ' active' : ''}" data-day="${dayIdx}">${label}</div>`;
        }

        html += `</div>
            <div class="schedule-channel-tabs" id="schedule-ch-tabs">`;

        CHANNELS.forEach((ch, idx) => {
            html += `<div class="schedule-ch-tab${idx === 0 ? ' active' : ''}" data-ch="${idx}">${ch.shortName}</div>`;
        });

        html += `</div>
            <div class="schedule-grid" id="schedule-content"></div>
        </div>`;

        modal.innerHTML = html;

        modal.querySelector('#schedule-close').addEventListener('click', hideScheduleModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) hideScheduleModal();
        });

        const dayTabs = modal.querySelectorAll('.schedule-tab');
        const chTabs = modal.querySelectorAll('.schedule-ch-tab');

        dayTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                dayTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                renderScheduleContent();
            });
        });

        chTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                chTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                renderScheduleContent();
            });
        });
    }

    function renderScheduleContent() {
        const modal = document.getElementById('schedule-modal');
        const activeDay = modal.querySelector('.schedule-tab.active');
        const activeCh = modal.querySelector('.schedule-ch-tab.active');
        if (!activeDay || !activeCh) return;

        const dayIdx = parseInt(activeDay.dataset.day);
        const chIdx = parseInt(activeCh.dataset.ch);
        const channel = CHANNELS[chIdx];
        if (!channel) return;

        const schedule = channel.schedule[dayIdx];
        if (!schedule) return;

        const now = getNow();
        const currentMinutes = now.getHours() * 60 + now.getMinutes();
        const isToday = dayIdx === now.getDay();

        let html = '';
        schedule.forEach((prog) => {
            const startMin = timeToMinutes(prog.start);
            let endMin = timeToMinutes(prog.end);
            if (endMin === 0) endMin = 1440;

            let rowClass = 'schedule-row';
            if (prog.isAd) rowClass += ' ad-row';
            if (isToday && currentMinutes >= startMin && currentMinutes < endMin && chIdx === currentChannelIndex) {
                rowClass += ' current-row';
            }

            const typeLabel = prog.isAd ? '广告' : '节目';
            html += `<div class="${rowClass}">
                <span class="time-col">${prog.start} - ${prog.end}</span>
                <span class="title-col">${prog.title}</span>
                <span class="type-col">${typeLabel}</span>
            </div>`;
        });

        modal.querySelector('#schedule-content').innerHTML = html;
    }

    function showScheduleModal() {
        const modal = document.getElementById('schedule-modal');
        buildScheduleModal();
        renderScheduleContent();
        modal.classList.add('open');
    }

    function hideScheduleModal() {
        document.getElementById('schedule-modal').classList.remove('open');
    }

    // ============================================================
    // 时间模拟控制
    // ============================================================
    function initSimPanel() {
        const simDayEl = document.getElementById('sim-day');
        const simTimeEl = document.getElementById('sim-time');
        const simApplyBtn = document.getElementById('sim-apply');
        const simResetBtn = document.getElementById('sim-reset');

        const now = new Date();
        simDayEl.value = String(now.getDay());
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        simTimeEl.value = `${hh}:${mm}`;

        simApplyBtn.addEventListener('click', () => {
            const day = parseInt(simDayEl.value);
            const [hours, minutes] = simTimeEl.value.split(':').map(Number);
            setSimulatedTime(day, hours, minutes);

            const channel = CHANNELS[currentChannelIndex];
            const program = getCurrentProgram(channel);
            currentProgramKey = `${currentChannelIndex}:${program.index}`;
            playVideoForProgram(program);
            showProgramInfo(program);
            updateClock();
            updateUI();
            bannerShownForKey = null;

            simApplyBtn.classList.add('active');
            simResetBtn.classList.remove('active');
        });

        simResetBtn.addEventListener('click', () => {
            clearSimulatedTime();

            const channel = CHANNELS[currentChannelIndex];
            const program = getCurrentProgram(channel);
            currentProgramKey = `${currentChannelIndex}:${program.index}`;
            playVideoForProgram(program);
            showProgramInfo(program);
            updateClock();
            updateUI();
            bannerShownForKey = null;

            simResetBtn.classList.add('active');
            simApplyBtn.classList.remove('active');
            setTimeout(() => simResetBtn.classList.remove('active'), 1000);
        });
    }

    // ============================================================
    // 效果面板初始化
    // ============================================================
    function initEffectsPanel() {
        const toggleNoise = document.getElementById('toggle-noise');
        const toggleGlitch = document.getElementById('toggle-glitch');

        toggleNoise.addEventListener('click', () => {
            toggleNoise.classList.toggle('on');
            if (toggleNoise.classList.contains('on')) {
                startNoise();
            } else {
                stopNoise();
            }
        });

        toggleGlitch.addEventListener('click', () => {
            toggleGlitch.classList.toggle('on');
            if (toggleGlitch.classList.contains('on')) {
                startGlitch();
            } else {
                stopGlitch();
            }
        });
    }

    // ============================================================
    // 初始化
    // ============================================================
    function renderChannelList() {
        channelListEl.innerHTML = '';
        CHANNELS.forEach((channel, idx) => {
            const li = document.createElement('li');
            li.className = 'channel-item' + (idx === currentChannelIndex ? ' active' : '');
            li.innerHTML = `
                <div class="channel-number">${channel.id}</div>
                <div>
                    <div class="channel-name">${channel.name}</div>
                    <div class="channel-now-playing">--</div>
                </div>
            `;
            li.addEventListener('click', () => switchChannel(idx));
            channelListEl.appendChild(li);
        });
    }

    function init() {
        renderChannelList();
        initSimPanel();
        initEffectsPanel();
        resizeStaticCanvas();

        document.getElementById('btn-schedule').addEventListener('click', showScheduleModal);

        const screen = document.getElementById('screen');
        screen.classList.add('turning-on');
        showStatic();

        setTimeout(() => {
            hideStatic();
            screen.classList.remove('turning-on');

            const channel = CHANNELS[currentChannelIndex];
            const program = getCurrentProgram(channel);
            currentProgramKey = `${currentChannelIndex}:${program.index}`;
            playVideoForProgram(program);
            showChannelBadge(channel);
            showChannelLogo(channel);
            showProgramInfo(program);
            updateUI();

            setTimeout(updatePreloadPool, 1000);
        }, 800);

        updateClock();
        setInterval(updateClock, 1000);
        setInterval(checkScheduledProgramChange, 1000);
    }

    // ============================================================
    // 键盘控制
    // ============================================================
    document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

        if (document.getElementById('schedule-modal').classList.contains('open')) {
            if (e.key === 'Escape' || e.key.toLowerCase() === 'g') {
                hideScheduleModal();
                e.preventDefault();
            }
            return;
        }

        switch(e.key) {
            case 'ArrowUp':
                e.preventDefault();
                switchChannel(currentChannelIndex - 1);
                break;
            case 'ArrowDown':
                e.preventDefault();
                switchChannel(currentChannelIndex + 1);
                break;
            case '1': case '2': case '3': case '4':
            case '5': case '6': case '7': case '8': case '9':
                const chIdx = parseInt(e.key) - 1;
                if (chIdx < CHANNELS.length) switchChannel(chIdx);
                break;
            case ' ':
                e.preventDefault();
                videoEl.muted = !videoEl.muted;
                break;
            case 'g': case 'G':
                e.preventDefault();
                showScheduleModal();
                break;
        }
    });

    document.getElementById('screen').addEventListener('click', () => {
        if (videoEl.paused) {
            videoEl.play().catch(() => {});
        }
    });

    window.addEventListener('load', init);
    window.addEventListener('resize', resizeStaticCanvas);
    </script>
</body>
</html>
